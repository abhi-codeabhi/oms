name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # --- proto + Go correctness -------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # buf breaking needs history to diff main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: buf lint
        run: buf lint

      - name: buf breaking (against main)
        if: github.event_name == 'pull_request'
        run: buf breaking --against "https://github.com/${{ github.repository }}.git#branch=main"

      - name: buf generate
        run: buf generate

      - name: Fail if generated code is stale
        run: |
          if [ -n "$(git status --porcelain gen/)" ]; then
            echo "::error::gen/ is out of date — run 'make gen' and commit the result."
            git --no-pager diff gen/ | head -200
            exit 1
          fi

      - name: go work sync
        run: go work sync

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

  # --- one docker build per service (matrix) ----------------------------------
  docker:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # All 18 services ship a Dockerfile: M1 control plane + M2 OMS data plane
        # + M3 integration plane.
        service: [identity, tenant, entitlements, staff, settings, onboarding, gateway,
                  catalog, ordering, kitchen, floor, billing, promotions, servicerequests,
                  connectorhub, payments, notifications, aggregators]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image (context = repo root)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: restorna/${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
