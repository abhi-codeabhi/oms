syntax = "proto3";
package restorna.onboarding.v1;

// OnboardingService orchestrates client signup -> go-live as a saga over identity,
// tenant, entitlements, staff, settings (and later catalog/floor). Each step is
// idempotent and compensable; progress is resumable. This is the "platform
// onboards a client (with logo, brand, outlets)" workflow.

enum Step {
  STEP_UNSPECIFIED = 0;
  STEP_ACCOUNT = 1;        // owner user + owner record
  STEP_PLAN = 2;           // assign plan/entitlement
  STEP_BRAND = 3;          // first brand + logo
  STEP_OUTLET = 4;         // first restaurant
  STEP_SETTINGS = 5;       // tax/currency/flow defaults
  STEP_TEAM = 6;           // invite first staff
  STEP_MENU = 7;           // seed/import menu (M2)
  STEP_GOLIVE = 8;         // QR codes generated, ready
}

message OnboardingState {
  string id = 1;           // onb_...
  string owner_id = 2;
  Step current = 3;
  repeated Step completed = 4;
  bool done = 5;
}

message StartOnboardingRequest {
  string owner_name = 1;
  string contact_email = 2;
  string contact_phone = 3;
  string country = 4;
  string plan_id = 5;      // default "free"
}
message StartOnboardingResponse { OnboardingState state = 1; }

message SubmitBrandRequest { string onboarding_id = 1; string brand_name = 2; string primary_color = 3; bytes logo = 4; string logo_content_type = 5; }
message SubmitBrandResponse { OnboardingState state = 1; string brand_id = 2; }

message SubmitOutletRequest { string onboarding_id = 1; string name = 2; string address = 3; string timezone = 4; string gstin = 5; }
message SubmitOutletResponse { OnboardingState state = 1; string restaurant_id = 2; }

message InviteTeamRequest { string onboarding_id = 1; repeated Invite invites = 2; }
message Invite { string name = 1; string email = 2; string phone = 3; string role = 4; }
message InviteTeamResponse { OnboardingState state = 1; }

message CompleteRequest { string onboarding_id = 1; }
message CompleteResponse { OnboardingState state = 1; }

message GetStateRequest { string onboarding_id = 1; }
message GetStateResponse { OnboardingState state = 1; }

service OnboardingService {
  rpc StartOnboarding(StartOnboardingRequest) returns (StartOnboardingResponse);
  rpc SubmitBrand(SubmitBrandRequest) returns (SubmitBrandResponse);
  rpc SubmitOutlet(SubmitOutletRequest) returns (SubmitOutletResponse);
  rpc InviteTeam(InviteTeamRequest) returns (InviteTeamResponse);
  rpc Complete(CompleteRequest) returns (CompleteResponse);
  rpc GetState(GetStateRequest) returns (GetStateResponse);
}
