# Render Blueprint — proves the Restorna Platform runs on a non-Kubernetes PaaS.
# Same images as everywhere else: each service is built from its Dockerfile with
# the repo root as build context (the Dockerfiles depend on sibling ./pkg and
# ./gen/go modules via go.work). Render injects $PORT; every service binds it.
#
# All 18 services are deployed here: 7 M1 control-plane (identity, tenant,
# entitlements, staff, settings, onboarding, gateway), 7 M2 OMS data-plane
# (catalog, ordering, kitchen, floor, billing, promotions, servicerequests), and
# 4 M3 integration-plane (connectorhub, payments, notifications, aggregators),
# plus the React web console as a static site. The gateway is the only
# internet-facing one in practice; the rest can be made private (type: pserv) if
# you front everything through the gateway (public provider webhooks reach
# connector-hub's IngestWebhook via the gateway).
#
# ⚠️ DB-PER-SERVICE: the blocks below point every service at the same Postgres for
# convenience, but services share table names (outbox, processed_events, goose) and
# WILL collide in one database. Before running: create one database per service
# (deploy/postgres/init-databases.sql) and override each service's DATABASE_URL to
# its own db name. Full procedure + secrets + costs: RENDER_DEPLOY.md.
#
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: restorna-postgres
    databaseName: restorna
    user: restorna
    plan: basic-256mb            # bump per environment
    ipAllowList: []              # only Render services may connect

services:
  # --- private NATS (JetStream) — internal only, not exposed to the internet ---
  - type: pserv
    name: nats
    runtime: image
    image:
      url: docker.io/library/nats:2-alpine
    plan: starter
    dockerCommand: "-js -m 8222"   # JetStream + monitoring
    # Reachable by other services at: nats://nats:4222

  # --- identity ---------------------------------------------------------------
  - type: web
    name: identity
    runtime: docker
    repo: https://github.com/restorna/platform
    dockerfilePath: ./services/identity/Dockerfile
    dockerContext: .               # repo root — required for go.work siblings
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: restorna-postgres
          property: connectionString
      - key: NATS_URL
        value: nats://nats:4222
      - key: JWT_PUBLIC_KEY
        sync: false                # set in dashboard / secret group
      - key: JWT_PRIVATE_KEY
        sync: false                # identity signs tokens; keep secret
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false

  # --- tenant -----------------------------------------------------------------
  - type: web
    name: tenant
    runtime: docker
    repo: https://github.com/restorna/platform
    dockerfilePath: ./services/tenant/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: restorna-postgres
          property: connectionString
      - key: NATS_URL
        value: nats://nats:4222
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: IDENTITY_URL
        fromService:
          type: web
          name: identity
          property: hostport      # internal host:port
      - key: ENTITLEMENTS_URL
        fromService:
          type: web
          name: entitlements
          property: hostport
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false

  # --- entitlements -----------------------------------------------------------
  - type: web
    name: entitlements
    runtime: docker
    repo: https://github.com/restorna/platform
    dockerfilePath: ./services/entitlements/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
