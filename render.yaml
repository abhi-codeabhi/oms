      - { key: CATALOG_URL,    fromService: { type: web, name: catalog,    property: hostport } }
      - { key: OTEL_EXPORTER_OTLP_ENDPOINT, sync: false }

  # --- billing (bills/payments — reads ordering, catalog, settings, promotions) ---
  - type: web
