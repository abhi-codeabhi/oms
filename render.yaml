      - { key: JWT_PUBLIC_KEY, sync: false }
      - { key: IDENTITY_URL,     fromService: { type: web, name: identity,     property: hostport } }
      - { key: TENANT_URL,       fromService: { type: web, name: tenant,       property: hostport } }
      - { key: ENTITLEMENTS_URL, fromService: { type: web, name: entitlements, property: hostport } }
      - { key: STAFF_URL,        fromService: { type: web, name: staff,        property: hostport } }
      - { key: SETTINGS_URL,     fromService: { type: web, name: settings,     property: hostport } }
      - { key: ONBOARDING_URL,   fromService: { type: web, name: onboarding,   property: hostport } }
      - { key: OTEL_EXPORTER_OTLP_ENDPOINT, sync: false }

  # ===========================================================================
  # M2 — Order Management System (OMS) data plane. Seven services that
  # choreograph the order→kitchen→floor→billing lifecycle over NATS (the event
  # bus is a hard dependency here: ordering/kitchen/floor/billing publish and
  # consume domain events; the inter-service *_URL vars below are the synchronous
  # request paths). Same image shape as M1: Dockerfile per service, repo-root
  # build context, $PORT bound, /healthz health check, migrations on startup.
  # ===========================================================================

  # --- catalog (menu/items — DB + NATS only) ----------------------------------
  - type: web
    name: catalog
    runtime: docker
    repo: https://github.com/restorna/platform
    dockerfilePath: ./services/catalog/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - { key: APP_ENV, value: production }
      - key: DATABASE_URL
        fromDatabase: { name: restorna-postgres, property: connectionString }
      - { key: NATS_URL, value: nats://nats:4222 }
      - { key: JWT_PUBLIC_KEY, sync: false }
      - { key: OTEL_EXPORTER_OTLP_ENDPOINT, sync: false }

  # --- ordering (order capture — DB + NATS only) ------------------------------
  - type: web
    name: ordering
    runtime: docker
    repo: https://github.com/restorna/platform
    dockerfilePath: ./services/ordering/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
