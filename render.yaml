      - { key: JWT_PUBLIC_KEY, sync: false }
      - { key: SETTINGS_URL,   fromService: { type: web, name: settings,   property: hostport } }
      - { key: OTEL_EXPORTER_OTLP_ENDPOINT, sync: false }

  # ===========================================================================
  # M3 — Integration Plane. Four services that plug the platform into external
  # providers through the connector framework: connector-hub is the registry +
  # per-tenant config + capability routing + inbound-webhook ingestion;
  # payments / notifications / aggregators resolve the active connector via
  # connector-hub and call the concrete provider adapter (pkg/connectors). Same
  # image shape as M1/M2: Dockerfile per service, repo-root build context, $PORT
  # bound, /healthz, migrations on startup, NATS choreography + outbox relay.
  # connector-hub encrypts secret connector config at rest under CONNECTOR_KEK.
  # ===========================================================================

  # --- connectorhub (connector registry + config + webhook ingestion) ---------
  - type: web
    name: connectorhub
    runtime: docker
    repo: https://github.com/restorna/platform
    dockerfilePath: ./services/connectorhub/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - { key: APP_ENV, value: production }
      - key: DATABASE_URL
        fromDatabase: { name: restorna-postgres, property: connectionString }
      - { key: NATS_URL, value: nats://nats:4222 }
      - { key: JWT_PUBLIC_KEY, sync: false }
      - { key: ENTITLEMENTS_URL, fromService: { type: web, name: entitlements, property: hostport } }
      # Key-Encryption-Key (32 bytes; base64/hex/raw) protecting secret connector
      # config at rest (AES-256-GCM). The service refuses to start without it.
      - key: CONNECTOR_KEK
        generateValue: true
      - { key: OTEL_EXPORTER_OTLP_ENDPOINT, sync: false }

  # --- payments (money over any gateway — resolves via connector-hub) ----------
  - type: web
    name: payments
    runtime: docker
    repo: https://github.com/restorna/platform
    dockerfilePath: ./services/payments/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - { key: APP_ENV, value: production }
      - key: DATABASE_URL
        fromDatabase: { name: restorna-postgres, property: connectionString }
      - { key: NATS_URL, value: nats://nats:4222 }
      - { key: JWT_PUBLIC_KEY, sync: false }
      - { key: CONNECTORHUB_URL, fromService: { type: web, name: connectorhub, property: hostport } }
      - { key: OTEL_EXPORTER_OTLP_ENDPOINT, sync: false }

  # --- notifications (SMS/WhatsApp/email/push — resolves via connector-hub) ----
  - type: web
    name: notifications
    runtime: docker
    repo: https://github.com/restorna/platform
    dockerfilePath: ./services/notifications/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
