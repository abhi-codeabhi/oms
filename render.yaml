      - { key: NATS_URL, value: nats://nats:4222 }
      - { key: JWT_PUBLIC_KEY, sync: false }
      - { key: CONNECTORHUB_URL, fromService: { type: web, name: connectorhub, property: hostport } }
      - { key: OTEL_EXPORTER_OTLP_ENDPOINT, sync: false }

  # --- aggregators (Zomato/Swiggy menu-out + orders-in → ordering) -------------
  - type: web
    name: aggregators
    runtime: docker
    repo: https://github.com/restorna/platform
    dockerfilePath: ./services/aggregators/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - { key: APP_ENV, value: production }
      - key: DATABASE_URL
        fromDatabase: { name: restorna-postgres, property: connectionString }
      - { key: NATS_URL, value: nats://nats:4222 }
      - { key: JWT_PUBLIC_KEY, sync: false }
      - { key: CONNECTORHUB_URL, fromService: { type: web, name: connectorhub, property: hostport } }
      - { key: CATALOG_URL,      fromService: { type: web, name: catalog,      property: hostport } }
      - { key: ORDERING_URL,     fromService: { type: web, name: ordering,     property: hostport } }
      - { key: OTEL_EXPORTER_OTLP_ENDPOINT, sync: false }

  # ===========================================================================
  # Web console — the control-plane admin SPA (React + Vite). Built as a static
  # site (npm run build → dist) and served from Render's CDN; the same three
  # knobs (build command, publish dir, SPA rewrite) also map onto the standalone
  # web/console/render.yaml (Netlify/Vercel/Cloudflare Pages/S3+CDN). Point
  # VITE_GATEWAY_URL at the gateway's public URL and add this origin to the
  # gateway's CORS_ALLOWED_ORIGINS.
  # ===========================================================================
  - type: web
    name: restorna-console
    runtime: static
    repo: https://github.com/restorna/platform
    rootDir: web/console
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      # Baked into the bundle at build time (Vite inlines VITE_*). Set in the
      # dashboard to the gateway's public URL, e.g. https://gateway.restorna.app.
      - key: VITE_GATEWAY_URL
        sync: false
    routes:
      # SPA fallback so React Router deep links resolve.
      - type: rewrite
        source: /*
        destination: /index.html
