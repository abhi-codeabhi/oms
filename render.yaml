# Render Blueprint — M1 CONTROL PLANE ONLY (fits Render's 25-service account cap).
#
# This deploys the 7 control-plane services + Postgres + private NATS + the web
# console = 10 resources. The full 18-service blueprint (adds the M2 OMS data
# plane + M3 integration plane) is preserved in render.full.yaml — deploy it once
# your account limit is raised or the internal services are made private.
#
# ⚠️ DB-PER-SERVICE: these blocks point every service at one Postgres for
# convenience, but services share table names (outbox, goose_db_version) and WILL
# collide in one database. Before running: create one database per service
# (deploy/postgres/init-databases.sql) and override each service's DATABASE_URL to
# its own db name. Full procedure + secrets + costs: RENDER_DEPLOY.md.
#
# Each service builds from its Dockerfile with the repo root as context (go.work
# siblings). Render injects $PORT. When deploying from a connected repo, no `repo:`
# key is needed — Render uses the repo the Blueprint lives in.
#
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: restorna-postgres
    databaseName: restorna
    user: restorna
    plan: basic-256mb
    ipAllowList: []

services:
  # --- private NATS (JetStream) ------------------------------------------------
  - type: pserv
    name: nats
    runtime: image
    image:
      url: docker.io/library/nats:2-alpine
    plan: starter
    dockerCommand: "-js -m 8222"

  # --- identity ----------------------------------------------------------------
  - type: web
    name: identity
    runtime: docker
    dockerfilePath: ./services/identity/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - { key: APP_ENV, value: production }
      - key: DATABASE_URL
        fromDatabase: { name: restorna-postgres, property: connectionString }
      - { key: NATS_URL, value: nats://nats:4222 }
      - { key: JWT_PUBLIC_KEY, sync: false }
      - { key: JWT_PRIVATE_KEY, sync: false }
      - { key: OTEL_EXPORTER_OTLP_ENDPOINT, sync: false }

  # --- tenant ------------------------------------------------------------------
  - type: web
    name: tenant
    runtime: docker
    dockerfilePath: ./services/tenant/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - { key: APP_ENV, value: production }
      - key: DATABASE_URL
        fromDatabase: { name: restorna-postgres, property: connectionString }
      - { key: NATS_URL, value: nats://nats:4222 }
      - { key: JWT_PUBLIC_KEY, sync: false }
      - { key: IDENTITY_URL,     fromService: { type: web, name: identity,     property: hostport } }
      - { key: ENTITLEMENTS_URL, fromService: { type: web, name: entitlements, property: hostport } }
      - { key: OTEL_EXPORTER_OTLP_ENDPOINT, sync: false }

  # --- entitlements ------------------------------------------------------------
  - type: web
    name: entitlements
    runtime: docker
    dockerfilePath: ./services/entitlements/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - { key: APP_ENV, value: production }
      - key: DATABASE_URL
        fromDatabase: { name: restorna-postgres, property: connectionString }
      - { key: NATS_URL, value: nats://nats:4222 }
      - { key: JWT_PUBLIC_KEY, sync: false }
      - { key: TENANT_URL, fromService: { type: web, name: tenant, property: hostport } }
      - { key: OTEL_EXPORTER_OTLP_ENDPOINT, sync: false }

  # --- staff -------------------------------------------------------------------
  - type: web
    name: staff
    runtime: docker
    dockerfilePath: ./services/staff/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - { key: APP_ENV, value: production }
      - key: DATABASE_URL
        fromDatabase: { name: restorna-postgres, property: connectionString }
      - { key: NATS_URL, value: nats://nats:4222 }
      - { key: JWT_PUBLIC_KEY, sync: false }
      - { key: IDENTITY_URL,     fromService: { type: web, name: identity,     property: hostport } }
      - { key: TENANT_URL,       fromService: { type: web, name: tenant,       property: hostport } }
      - { key: ENTITLEMENTS_URL, fromService: { type: web, name: entitlements, property: hostport } }
      - { key: OTEL_EXPORTER_OTLP_ENDPOINT, sync: false }

  # --- settings ----------------------------------------------------------------
  - type: web
    name: settings
    runtime: docker
    dockerfilePath: ./services/settings/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - { key: APP_ENV, value: production }
      - key: DATABASE_URL
        fromDatabase: { name: restorna-postgres, property: connectionString }
      - { key: NATS_URL, value: nats://nats:4222 }
      - { key: JWT_PUBLIC_KEY, sync: false }
      - { key: OTEL_EXPORTER_OTLP_ENDPOINT, sync: false }

  # --- onboarding --------------------------------------------------------------
  - type: web
    name: onboarding
    runtime: docker
    dockerfilePath: ./services/onboarding/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - { key: APP_ENV, value: production }
      - key: DATABASE_URL
        fromDatabase: { name: restorna-postgres, property: connectionString }
      - { key: NATS_URL, value: nats://nats:4222 }
      - { key: JWT_PUBLIC_KEY, sync: false }
      - { key: IDENTITY_URL,     fromService: { type: web, name: identity,     property: hostport } }
      - { key: TENANT_URL,       fromService: { type: web, name: tenant,       property: hostport } }
      - { key: ENTITLEMENTS_URL, fromService: { type: web, name: entitlements, property: hostport } }
      - { key: STAFF_URL,        fromService: { type: web, name: staff,        property: hostport } }
      - { key: SETTINGS_URL,     fromService: { type: web, name: settings,     property: hostport } }
      - { key: OTEL_EXPORTER_OTLP_ENDPOINT, sync: false }

  # --- gateway (internet-facing edge + BFFs) -----------------------------------
  - type: web
    name: gateway
    runtime: docker
    dockerfilePath: ./services/gateway/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - { key: APP_ENV, value: production }
      - { key: JWT_PUBLIC_KEY, sync: false }
      - { key: IDENTITY_URL,     fromService: { type: web, name: identity,     property: hostport } }
      - { key: TENANT_URL,       fromService: { type: web, name: tenant,       property: hostport } }
      - { key: ENTITLEMENTS_URL, fromService: { type: web, name: entitlements, property: hostport } }
      - { key: STAFF_URL,        fromService: { type: web, name: staff,        property: hostport } }
      - { key: SETTINGS_URL,     fromService: { type: web, name: settings,     property: hostport } }
      - { key: ONBOARDING_URL,   fromService: { type: web, name: onboarding,   property: hostport } }
      - { key: OTEL_EXPORTER_OTLP_ENDPOINT, sync: false }

  # --- web console (control-plane admin SPA) -----------------------------------
  - type: web
    name: restorna-console
    runtime: static
    rootDir: web/console
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      # Set to the gateway's public URL in the dashboard (Vite bakes it at build).
      - { key: VITE_GATEWAY_URL, sync: false }
    routes:
      - { type: rewrite, source: /*, destination: /index.html }
