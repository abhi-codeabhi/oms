# Local infra for development. App services run via `make run/<svc>` against these.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: restorna
      POSTGRES_PASSWORD: restorna
      POSTGRES_DB: restorna
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restorna"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2-alpine
    command: ["-js", "-m", "8222"]   # JetStream + monitoring
    ports: ["4222:4222", "8222:8222"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports: ["16686:16686", "4317:4317", "4318:4318"]

volumes:
  pgdata:
