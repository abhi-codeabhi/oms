apiVersion: apps/v1
kind: Deployment
metadata:
  name: entitlements
  labels:
    app.kubernetes.io/name: entitlements
    app.kubernetes.io/part-of: restorna-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: entitlements
  template:
    metadata:
      labels:
        app.kubernetes.io/name: entitlements
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: entitlements
          image: ghcr.io/restorna/entitlements:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          envFrom:
            - configMapRef:
                name: entitlements-config
            - secretRef:
                name: entitlements-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: entitlements
  labels:
    app.kubernetes.io/name: entitlements
    app.kubernetes.io/part-of: restorna-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: entitlements
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: entitlements
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: entitlements
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
