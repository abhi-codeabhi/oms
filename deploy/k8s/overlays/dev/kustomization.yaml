apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: restorna-dev
resources:
  - ../../base
nameSuffix: ""

# Dev: single replica, mutable tag.
images:
  - name: ghcr.io/restorna/gateway
    newTag: dev
  - name: ghcr.io/restorna/identity
    newTag: dev
  - name: ghcr.io/restorna/tenant
    newTag: dev
  - name: ghcr.io/restorna/entitlements
    newTag: dev
  - name: ghcr.io/restorna/staff
    newTag: dev
  - name: ghcr.io/restorna/settings
    newTag: dev
  - name: ghcr.io/restorna/catalog
    newTag: dev
  - name: ghcr.io/restorna/ordering
    newTag: dev
  - name: ghcr.io/restorna/promotions
    newTag: dev
  - name: ghcr.io/restorna/kitchen
    newTag: dev
  - name: ghcr.io/restorna/billing
    newTag: dev
  - name: ghcr.io/restorna/floor
    newTag: dev
  - name: ghcr.io/restorna/servicerequests
    newTag: dev
  # --- M3 integration plane ---
  - name: ghcr.io/restorna/connectorhub
    newTag: dev
  - name: ghcr.io/restorna/payments
    newTag: dev
  - name: ghcr.io/restorna/notifications
    newTag: dev
  - name: ghcr.io/restorna/aggregators
    newTag: dev

replicas:
  - name: gateway
    count: 1
  - name: identity
    count: 1
  - name: tenant
    count: 1
  - name: entitlements
    count: 1
  - name: staff
    count: 1

patches:
  - target: { kind: Ingress, name: restorna-gateway }
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: api.dev.restorna.example
