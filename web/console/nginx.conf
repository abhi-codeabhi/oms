# SPA nginx config: serve the static build, fall back to index.html for client-side
# routes (React Router), and long-cache the hashed assets. The console talks to the
# gateway directly via VITE_GATEWAY_URL (baked at build), so no /api proxy is needed
# here — but one is included (commented) for same-origin deploys behind one host.
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed assets: immutable, cache hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional same-origin API proxy (uncomment + set GATEWAY_UPSTREAM if you front the
  # gateway and console with one hostname instead of using VITE_GATEWAY_URL + CORS):
  # location /api/ {
  #   proxy_pass http://gateway:8080;
  #   proxy_set_header Host $host;
  #   proxy_set_header Authorization $http_authorization;
  # }

  location = /healthz { return 200 'ok'; add_header Content-Type text/plain; }
}
